name: Release

# When a version-bump PR is merged into main (see scripts/bump-version.sh),
# the version in Resources/Info.plist changes. This workflow reads that version,
# and if a matching tag does not yet exist, it tags, builds the .app, signs it
# with a Developer ID certificate, notarizes and staples it, and publishes a
# GitHub Release. On ordinary pushes (version unchanged) it exits early. Using
# GITHUB_TOKEN only — no PAT needed — since tagging and releasing happen in the
# same job.
#
# Signing and notarization need these repository secrets:
#   MACOS_CERTIFICATE_P12       base64 of the Developer ID Application .p12
#   MACOS_CERTIFICATE_PASSWORD  password of that .p12
#   APPLE_API_KEY_ID            App Store Connect API key id
#   APPLE_API_ISSUER_ID         App Store Connect issuer id
#   APPLE_API_KEY_P8            base64 of the AuthKey_*.p8 private key

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    # macos-26 ships Xcode 26 by default, which actool needs to compile the
    # Icon Composer document (icons/wakeroad.icon).
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Read version and check tag
        id: version
        run: |
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print CFBundleShortVersionString' Resources/Info.plist)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists; nothing to release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Releasing v$VERSION."
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.version.outputs.release == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION"
          git push origin "v$VERSION"

      # The action creates a throwaway keychain and removes it again in its post
      # step, so nothing has to be cleaned up by hand.
      - name: Import Developer ID certificate
        if: steps.version.outputs.release == 'true'
        uses: Apple-Actions/import-codesign-certs@b610f78488812c1e56b20e6df63ec42d833f2d14 # v6.0.0
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}

      # Pass the identity to make-app.sh by its SHA-1 hash so the certificate's
      # common name never has to be hardcoded. The keychain was just created, so
      # it holds exactly one Developer ID Application identity.
      - name: Resolve signing identity
        if: steps.version.outputs.release == 'true'
        run: |
          keychain="$RUNNER_TEMP/signing_temp.keychain-db"
          identity="$(security find-identity -v -p codesigning "$keychain" \
            | awk '/Developer ID Application/ { print $2; exit }')"
          if [ -z "$identity" ]; then
            echo "No Developer ID Application identity in $keychain" >&2
            security find-identity -v -p codesigning "$keychain" >&2
            exit 1
          fi
          echo "CODESIGN_IDENTITY=$identity" >> "$GITHUB_ENV"
          echo "CODESIGN_KEYCHAIN=$keychain" >> "$GITHUB_ENV"

      - name: Build app bundle
        if: steps.version.outputs.release == 'true'
        run: make app

      # Stapling writes the ticket into the bundle, so this has to happen before
      # the distributed zip is created.
      - name: Notarize and staple
        if: steps.version.outputs.release == 'true'
        env:
          NOTARY_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          NOTARY_KEY_BASE64: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          NOTARY_KEY_PATH="$RUNNER_TEMP/notary-key.p8"
          export NOTARY_KEY_PATH
          printf '%s' "$NOTARY_KEY_BASE64" | base64 --decode > "$NOTARY_KEY_PATH"
          ./scripts/notarize-app.sh

      - name: Remove notarization key
        if: always()
        run: rm -f "$RUNNER_TEMP/notary-key.p8"

      - name: Package .app into a zip
        if: steps.version.outputs.release == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ditto -c -k --sequesterRsrc --keepParent dist/WakeRoad.app "WakeRoad-$VERSION.zip"

      - name: Create GitHub Release
        if: steps.version.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v$VERSION" "WakeRoad-$VERSION.zip" \
            --title "v$VERSION" \
            --generate-notes

      - name: Update Homebrew tap
        if: steps.version.outputs.release == 'true'
        uses: dayflower/brew-up@3f2a9919dd8b749fef56f762e911d42df31435d4 # v0.1.5
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          release-tag: v${{ steps.version.outputs.version }}
          template-path: .github/homebrew/wakeroad.rb.mustache
          output-path: Casks/wakeroad.rb
          asset-map: |
            default=WakeRoad-{{version}}.zip
          target-repo: dayflower/homebrew-tap
          target-branch: main
          target-repo-token: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
          publish-mode: pr-auto-merge
          auto-merge-method: squash
