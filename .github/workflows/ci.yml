name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # swift-format ships with Xcode 16+, so no extra install is needed.
      - name: Lint
        run: make check

      - name: Build
        run: make build

      - name: Test
        run: make test
